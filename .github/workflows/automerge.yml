name: Autonomous PR Merge Bot

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: automerge-queue
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  validate_and_merge:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run Automerge Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/main/.github/scripts/bot.py" > bot.py
          python bot.py
